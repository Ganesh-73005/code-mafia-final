version: '3.8'

services:
  redis:
    build:
      context: .
      dockerfile: Dockerfile.redis
    image: code-mafia-redis:latest
    container_name: code-mafia-redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-ganesh123}
    networks:
      - code-mafia-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./go-backend
    image: code-mafia-backend:latest
    container_name: code-mafia-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-code_mafia}
      - REDIS_ADDRESS=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-ganesh123}
      - SECRET_KEY=${SECRET_KEY}
      - RAPIDAPI_URL=${RAPIDAPI_URL:-https://judge0-ce.p.rapidapi.com}
      - RAPIDAPI_HOST=${RAPIDAPI_HOST:-judge0-ce.p.rapidapi.com}
      - RAPIDAPI_KEY=${RAPIDAPI_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - code-mafia-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./client
      args:
        # Use empty string to make it use relative paths (will work with EC2 public IP)
        - REACT_APP_SERVER_BASEAPI=${REACT_APP_SERVER_BASEAPI:-}
    image: code-mafia-frontend:latest
    container_name: code-mafia-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - code-mafia-network
    restart: always

networks:
  code-mafia-network:
    driver: bridge
